<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>纸片人男友 — Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a090a; font-family: "Noto Sans SC", system-ui, sans-serif; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a272a; border-radius: 3px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script src="image-slot.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <DesignCanvas>
      <DCSection id="screens" title="纸片人男友 · 核心屏幕" subtitle="深色 · 粉色主题 · MVP 5 屏 · Noto Sans/Serif SC">
        <DCArtboard id="home" label="01 · 首页 · 选择角色" width={1280} height={800}>
          <PageHome />
        </DCArtboard>
        <DCArtboard id="login" label="02 · 登录 / 注册" width={1280} height={800}>
          <PageLogin />
        </DCArtboard>
        <DCArtboard id="chat" label="03 · 聊天页 · 核心" width={1440} height={860}>
          <PageChat />
        </DCArtboard>
        <DCArtboard id="profile" label="04 · 我的资料" width={1280} height={800}>
          <PageProfile />
        </DCArtboard>
        <DCArtboard id="settings" label="05 · 设置" width={1280} height={800}>
          <PageSettings />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
</script>
</body>
</html>
